<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS5 Icon Manager - fsociety</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--green:#00ff41;--green-dim:rgba(0,255,65,0.6);--red:#ff0040;--yellow:#ffd700;--cyan:#00e5ff;--orange:#ff6b00}
body{font-family:'Fira Code',monospace;background:var(--bg);color:var(--green);min-height:100vh}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15),rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999}
.container{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,0,0.9);border-bottom:1px solid rgba(0,255,65,0.2);position:relative}
.logo{display:flex;align-items:center;gap:14px}
.logo img{width:55px;height:55px;filter:drop-shadow(0 0 12px rgba(0,255,65,0.6));border:1px solid rgba(0,255,65,0.3)}
.logo span{font-family:'Share Tech Mono',monospace;font-size:1.1rem;text-transform:uppercase;letter-spacing:0.12em}
.header-center{position:absolute;left:50%;transform:translateX(-50%)}
#fsocietyText{font-family:'Share Tech Mono',monospace;font-size:2.5rem;font-weight:bold;text-transform:uppercase;letter-spacing:0.4em;color:var(--green);text-shadow:0 0 20px var(--green),0 0 40px var(--green)}
.connection{display:flex;align-items:center;gap:10px;position:relative}
input{background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.3);padding:8px 12px;color:var(--green);font-family:'Fira Code',monospace;font-size:0.85rem}
input:focus{outline:none;border-color:var(--green);box-shadow:0 0 15px rgba(0,255,65,0.3)}
input::placeholder{color:rgba(0,255,65,0.4)}
button{background:transparent;border:1px solid var(--green);color:var(--green);padding:8px 20px;font-family:'Share Tech Mono',monospace;font-size:0.85rem;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
button:hover{background:var(--green);color:var(--bg);box-shadow:0 0 20px rgba(0,255,65,0.5)}
button:disabled{opacity:0.3;cursor:not-allowed}
button.danger{border-color:var(--red);color:var(--red)}
button.danger:hover{background:var(--red);color:#fff}
button.warn{border-color:var(--orange);color:var(--orange)}
button.warn:hover{background:var(--orange);color:#000}
.status-dot{width:8px;height:8px;background:rgba(0,255,65,0.3)}
.status-dot.connected{background:var(--green);box-shadow:0 0 15px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--green)}50%{box-shadow:0 0 25px var(--green)}}
.ip-dropdown{position:absolute;top:100%;left:0;background:#0a0a0a;border:1px solid var(--green);display:none;z-index:100;min-width:220px;margin-top:5px}
.ip-dropdown.show{display:block}
.ip-dropdown div{padding:8px 12px;cursor:pointer;font-size:0.8rem}
.ip-dropdown div:hover{background:rgba(0,255,65,0.2)}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:250px;background:rgba(0,0,0,0.8);border-right:1px solid rgba(0,255,65,0.15);display:flex;flex-direction:column}
.sidebar-header{padding:12px 16px;border-bottom:1px solid rgba(0,255,65,0.15);font-family:'Share Tech Mono',monospace;font-size:0.75rem;text-transform:uppercase}
.apps-list{flex:1;overflow-y:auto;padding:8px}
.app-item{padding:12px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}
.app-item:hover{background:rgba(0,255,65,0.05);border-color:rgba(0,255,65,0.2)}
.app-item.selected{background:rgba(0,255,65,0.1);border-color:var(--green)}
.app-name{font-size:0.85rem}
.content{flex:1;display:flex;flex-direction:column;background:rgba(0,0,0,0.5)}
.content-header{padding:12px 20px;border-bottom:1px solid rgba(0,255,65,0.15);display:none;align-items:center;gap:10px;flex-wrap:wrap}
.content-title{font-family:'Share Tech Mono',monospace;font-size:1.1rem;text-transform:uppercase}
.badge{font-size:0.55rem;padding:3px 8px;border:1px solid}
.cid-badge{font-size:0.6rem;padding:3px 8px;background:rgba(255,107,0,0.15);border:1px solid var(--orange);color:var(--orange)}
.image-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:16px;overflow-y:auto}
.image-card{background:rgba(0,0,0,0.6);border:1px solid rgba(0,255,65,0.2);position:relative}
.image-card:hover{border-color:var(--green);box-shadow:0 0 20px rgba(0,255,65,0.15)}
.image-card.uploading{border-color:var(--yellow);animation:glow 1s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.2)}50%{box-shadow:0 0 20px rgba(255,215,0,0.5)}}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,255,65,0.05);border-bottom:1px solid rgba(0,255,65,0.15);font-size:0.75rem}
.card-dim{font-size:0.65rem;color:var(--green-dim);padding:2px 6px;background:rgba(0,255,65,0.1);border:1px solid rgba(0,255,65,0.15)}
.card-preview{aspect-ratio:16/9;background:#050505;display:flex;align-items:center;justify-content:center;color:rgba(0,255,65,0.4);font-size:0.7rem;overflow:hidden}
.card-preview.square{aspect-ratio:1}
.card-preview img{max-width:100%;max-height:100%;object-fit:contain}
.card-locs{padding:6px 10px;font-size:0.5rem;background:rgba(0,0,0,0.4);border-top:1px solid rgba(0,255,65,0.1);max-height:80px;overflow-y:auto}
.loc{padding:2px 0;display:flex;align-items:center;gap:6px}
.loc-dot{width:6px;height:6px;min-width:6px;border-radius:50%}
.loc-dot.appmeta{background:var(--green)}
.loc-dot.catalog{background:var(--orange)}
.loc-dot.other{background:var(--cyan)}
.loc-path{word-break:break-all;color:var(--green-dim)}
.loc-size{color:rgba(0,255,65,0.4);white-space:nowrap}
.card-actions{padding:8px 12px;background:rgba(0,0,0,0.4)}
.card-actions button{width:100%;font-size:0.7rem;padding:6px 12px}
.card-status{padding:6px 10px;font-size:0.55rem;background:rgba(0,0,0,0.5);border-top:1px solid rgba(0,255,65,0.1);display:none;max-height:100px;overflow-y:auto}
.card-status.show{display:block}
.card-status .step{margin-bottom:2px;padding-left:8px;border-left:2px solid var(--green)}
.terminal{height:150px;background:#050505;border-top:1px solid rgba(0,255,65,0.2)}
.terminal-header{padding:6px 16px;background:rgba(0,255,65,0.05);border-bottom:1px solid rgba(0,255,65,0.1);font-family:'Share Tech Mono',monospace;font-size:0.7rem;text-transform:uppercase}
.terminal-content{padding:8px 16px;font-size:0.7rem;height:calc(100% - 30px);overflow-y:auto}
.log{margin-bottom:3px}.log-time{color:rgba(0,255,65,0.4);margin-right:8px}
.log-msg{color:rgba(0,255,65,0.8)}.log-msg.success{color:var(--green)}.log-msg.error{color:var(--red)}.log-msg.warn{color:var(--yellow)}.log-msg.info{color:var(--cyan)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(0,255,65,0.4);font-size:0.85rem}
.overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.overlay.show{display:flex}
.spinner{width:24px;height:24px;border:2px solid rgba(0,255,65,0.2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay span{font-size:0.7rem}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#0a0a0a;border:1px solid var(--green);padding:20px;max-width:850px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-family:'Share Tech Mono',monospace;font-size:1rem;margin-bottom:14px}
.modal table{width:100%;border-collapse:collapse;font-size:0.6rem;margin-bottom:14px}
.modal th,.modal td{padding:4px 8px;border:1px solid rgba(0,255,65,0.2);text-align:left;word-break:break-all}
.modal th{background:rgba(0,255,65,0.1)}
</style>
</head>
<body>
<div class="container">
<header class="header">
<div class="logo">
<img src="https://customer-assets.emergentagent.com/job_ps5-loader-mod/artifacts/d5zk21kp_IMG_4711.jpeg" alt="fsociety">
<span>PS5 Icon Manager <span style="font-size:0.5rem;color:var(--yellow);margin-left:6px">v2.1</span></span>
</div>
<div class="header-center"><div id="fsocietyText">FSOCIETY</div></div>
<div class="connection">
<div style="position:relative">
<input type="text" id="ip" placeholder="IP PS5" style="width:150px">
<div class="ip-dropdown" id="ipDropdown"></div>
</div>
<input type="text" id="port" value="2121" style="width:70px">
<button id="connectBtn">Connecter</button>
<button id="testBtn" style="padding:4px 8px;font-size:0.55rem;background:transparent;border:1px solid var(--green-dim);color:var(--green-dim);cursor:pointer;display:none" data-testid="test-conn-btn">Test</button>
<div class="status-dot" id="statusDot"></div>
</div>
</header>
<div class="main">
<aside class="sidebar">
<div class="sidebar-header">Applications (<span id="appCount">0</span>)</div>
<div class="apps-list" id="appsList"><div class="empty">Connectez-vous</div></div>
</aside>
<main class="content">
<div class="content-header" id="contentHeader">
<div class="content-title" id="selectedApp">-</div>
<span id="cidBadge" class="cid-badge" style="display:none"></span>
<button id="inspectBtn" style="padding:5px 10px;font-size:0.6rem" class="warn">Inspecter DB</button>
<button id="restoreBtn" style="padding:5px 10px;font-size:0.6rem;background:#ff6b35;color:#000;border:none;cursor:pointer" data-testid="restore-btn">Restaurer backups</button>
</div>
<div class="image-grid" id="imageGrid"><div class="empty">Selectionnez une application</div></div>
</main>
</div>
<div class="terminal">
<div class="terminal-header">> Console</div>
<div class="terminal-content" id="logs"></div>
</div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal"><h2>DB - <span id="modalAppId"></span></h2><div id="modalBody"></div><button onclick="closeModal()">Fermer</button></div></div>
<input type="file" id="fileInput" style="display:none" accept="image/*,.jpg,.jpeg,.png,.bmp,.webp">
<script>
(function(){
var API='http://localhost:8001/api';
var sid=null,selApp=null,busy=false,uploadInfo=null;

function log(m,t){var now=new Date().toLocaleTimeString('fr-FR');var el=document.getElementById('logs');el.innerHTML+='<div class="log"><span class="log-time">['+now+']</span><span class="log-msg '+(t||'')+'">'+m+'</span></div>';el.scrollTop=99999}

function saveIp(ip,port){try{var h=JSON.parse(localStorage.getItem('ps5_ips')||'[]');var e=ip+':'+port;h=h.filter(function(x){return x!==e});h.unshift(e);localStorage.setItem('ps5_ips',JSON.stringify(h.slice(0,5)));localStorage.setItem('ps5_ip',ip);localStorage.setItem('ps5_port',port)}catch(ex){try{document.cookie='ps5_ip='+ip+';max-age=31536000;path=/';document.cookie='ps5_port='+port+';max-age=31536000;path=/'}catch(ex2){}}}
function loadIp(){try{var ip=localStorage.getItem('ps5_ip');var port=localStorage.getItem('ps5_port');if(!ip){var c=document.cookie.split(';');for(var i=0;i<c.length;i++){var p=c[i].trim().split('=');if(p[0]==='ps5_ip')ip=p[1];if(p[0]==='ps5_port')port=p[1]}}if(ip)document.getElementById('ip').value=ip;if(port)document.getElementById('port').value=port;buildDD(JSON.parse(localStorage.getItem('ps5_ips')||'[]'))}catch(ex){}}
function buildDD(list){var dd=document.getElementById('ipDropdown');if(!list||!list.length){dd.innerHTML='';return}dd.innerHTML=list.map(function(x){return'<div data-v="'+x+'">'+x+'</div>'}).join('');dd.querySelectorAll('div').forEach(function(el){el.onclick=function(){var p=this.getAttribute('data-v').split(':');document.getElementById('ip').value=p[0];document.getElementById('port').value=p[1]||'2121';dd.classList.remove('show')}})}
document.getElementById('ip').onfocus=function(){var d=document.getElementById('ipDropdown');if(d.innerHTML)d.classList.add('show')};
document.getElementById('ip').onblur=function(){setTimeout(function(){document.getElementById('ipDropdown').classList.remove('show')},200)};
loadIp();

var fs=document.getElementById('fsocietyText');
function tw(){fs.textContent='';var t='FSOCIETY',i=0;function n(){if(i<t.length){fs.textContent+=t.charAt(i);i++;setTimeout(n,150)}}n()}
function fx(){var e=['tw','blink','glitch'][Math.floor(Math.random()*3)];fs.style.transition='';fs.style.opacity='1';fs.style.filter='';fs.style.transform='';if(e==='tw')tw();else if(e==='blink'){fs.textContent='FSOCIETY';var c=0;var b=setInterval(function(){fs.style.opacity=fs.style.opacity==='0'?'1':'0';c++;if(c>10)clearInterval(b)},200)}else{fs.textContent='FSOCIETY';var c2=0;var g=setInterval(function(){fs.style.transform='translate('+((Math.random()-.5)*8)+'px,'+((Math.random()-.5)*8)+'px)';c2++;if(c2>12){clearInterval(g);fs.style.transform=''}},50)}}
setInterval(fx,12000);setTimeout(fx,3000);

document.getElementById('connectBtn').onclick=function(){
if(sid){if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null}fetch(API+'/ftp/disconnect?session_id='+sid,{method:'POST'});sid=null;selApp=null;document.getElementById('statusDot').classList.remove('connected');this.textContent='Connecter';this.classList.remove('danger');document.getElementById('testBtn').style.display='none';document.getElementById('appsList').innerHTML='<div class="empty">Connectez-vous</div>';document.getElementById('appCount').textContent='0';document.getElementById('contentHeader').style.display='none';document.getElementById('imageGrid').innerHTML='<div class="empty">Selectionnez une application</div>';document.getElementById('cidBadge').style.display='none';log('Deconnecte','error')}
else{var ip=document.getElementById('ip').value,port=document.getElementById('port').value;if(!ip){alert('Entrez IP');return}log('Connexion '+ip+':'+port+'...');fetch(API+'/ftp/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:ip,port:parseInt(port)})}).then(function(r){return r.json()}).then(function(d){if(d.success){sid=d.session_id;saveIp(ip,port);document.getElementById('statusDot').classList.add('connected');document.getElementById('connectBtn').textContent='Deconnecter';document.getElementById('connectBtn').classList.add('danger');log('Connecte!','success');log('DB cache: '+(d.db_cache||'?'),'info');document.getElementById('testBtn').style.display='inline';loadApps()}else log('Erreur: '+(d.detail||'fail'),'error')}).catch(function(e){log('Erreur: '+e.message,'error')})}
};

function loadApps(){log('Scan /user/app/...');fetch(API+'/ftp/apps?session_id='+sid).then(function(r){return r.json()}).then(function(d){var a=d.apps||[];document.getElementById('appCount').textContent=a.length;if(!a.length){document.getElementById('appsList').innerHTML='<div class="empty">Aucune app</div>';return}var h='';for(var i=0;i<a.length;i++)h+='<div class="app-item" data-id="'+a[i].cusa_id+'"><div class="app-name">'+a[i].cusa_id+'</div></div>';document.getElementById('appsList').innerHTML=h;document.querySelectorAll('.app-item').forEach(function(el){el.onclick=function(){document.querySelectorAll('.app-item').forEach(function(x){x.classList.remove('selected')});this.classList.add('selected');pickApp(this.getAttribute('data-id'))}});log(a.length+' apps','success')}).catch(function(e){log('Erreur: '+e.message,'error')})}

function pickApp(id){
selApp=id;
document.getElementById('contentHeader').style.display='flex';
document.getElementById('selectedApp').textContent=id;
document.getElementById('cidBadge').style.display='none';
document.getElementById('imageGrid').innerHTML='<div class="empty"><div class="spinner" style="margin-bottom:12px"></div>Scan app.db + dossiers FTP...<br><span style="font-size:0.7rem;margin-top:8px">(peut prendre 30-60s)</span></div>';
log('=== SCAN '+id+' ===','warn');

fetch(API+'/ftp/scan-app/'+id+'?session_id='+sid).then(function(r){return r.json()}).then(function(d){
if(!d.success&&d.detail){log('Erreur: '+d.detail,'error');return}

// Show conceptIds
var cids=Array.isArray(d.concept_ids)?d.concept_ids:[];
if(cids.length){
document.getElementById('cidBadge').textContent='conceptId: '+cids.join(', ');
document.getElementById('cidBadge').style.display='inline';
log('ConceptId: '+cids.join(', '),'info');
}

// Show scanned dirs
var scannedDirs=Array.isArray(d.dirs_scanned)?d.dirs_scanned:[];
scannedDirs.forEach(function(dir){log('  Dossier: '+dir,'info')});

var images=Array.isArray(d.images)?d.images:[];
var html='';

for(var i=0;i<images.length;i++){
var img=images[i];
var locs=img.locations||[];
var hasImage=locs.length>0;

var preview='Pas trouve';
var bestData=null;var bestExt='png';
for(var j=0;j<locs.length;j++){if(locs[j].data){bestData=locs[j].data;bestExt=locs[j].file.split('.').pop().toLowerCase();break}}
var mimeMap={'png':'image/png','jpg':'image/jpeg','jpeg':'image/jpeg','webp':'image/webp','bmp':'image/bmp','dds':'image/png'};
var mime=mimeMap[bestExt]||'image/png';
if(bestData) preview='<img src="data:'+mime+';base64,'+bestData+'">';

// ALL files are replaced (including icon0_01.png variants)
var mainPaths=[];
for(var k=0;k<locs.length;k++){
mainPaths.push(locs[k].full_path);
}

var locsHtml='<div class="card-locs">';
if(locs.length){
for(var k=0;k<locs.length;k++){
var loc=locs[k];
var dc='other';
if(loc.dir.indexOf('appmeta')>=0)dc='appmeta';
else if(loc.dir.indexOf('catalog')>=0)dc='catalog';
var isMain=true;
var style='';
locsHtml+='<div class="loc" style="'+style+'"><div class="loc-dot '+dc+'"></div><span class="loc-path">'+loc.full_path+'</span><span class="loc-size">'+loc.size+'b</span></div>';
}
}else{
locsHtml+='<div style="color:var(--red)">Aucun fichier</div>';
}
locsHtml+='</div>';

var btnLabel=hasImage?'Remplacer ('+mainPaths.length+' fichiers)':'Ajouter';
var pathsStr=mainPaths.join(',');

html+='<div class="image-card" id="card-'+img.type+'">';
html+='<div class="overlay" id="ov-'+img.type+'"><div class="spinner"></div><span>Upload...</span></div>';
html+='<div class="card-header"><span>'+img.label+'</span><span class="card-dim">'+img.width+'x'+img.height+'</span></div>';
html+='<div class="card-preview'+(img.square?' square':'')+'">'+preview+'</div>';
html+=locsHtml;
html+='<div class="card-actions"><button data-type="'+img.type+'" data-paths="'+pathsStr+'" data-found="'+(hasImage?'1':'0')+'">'+btnLabel+'</button>';
if(img.type!=='save_data'){html+='<button class="warn force-db-btn" data-type="'+img.type+'" style="margin-top:4px">Forcer chemin dans DB</button>'}
if(hasImage){html+='<button class="delete-btn" data-type="'+img.type+'" data-paths="'+pathsStr+'" style="margin-top:4px;background:#ff2244;color:#fff;border:none;cursor:pointer;padding:4px 8px;font-size:0.6rem">Supprimer</button>'}
html+='</div>';
html+='<div class="card-status" id="st-'+img.type+'"></div>';
html+='</div>';
}

document.getElementById('imageGrid').innerHTML=html;
document.querySelectorAll('.card-actions button').forEach(function(b){
if(b.classList.contains('force-db-btn')||b.classList.contains('delete-btn'))return;
b.onclick=function(){
if(busy){alert('Patientez...');return}
uploadInfo={type:this.getAttribute('data-type'),paths:this.getAttribute('data-paths'),found:this.getAttribute('data-found')==='1'};
document.getElementById('fileInput').click();
};
});

// Delete button handlers
document.querySelectorAll('.delete-btn').forEach(function(b){
b.onclick=function(){
if(busy)return;
var imgType=this.getAttribute('data-type');
var paths=this.getAttribute('data-paths');
var label={"icon0":"Jaquette","pic0":"Background XMB","pic1":"BG Start 1","pic2":"BG Start 2","save_data":"Save Data"}[imgType]||imgType;
if(!confirm('SUPPRIMER '+label+'?\n\nTous les fichiers seront effaces de la PS5.\nCette action est irreversible.'))return;
busy=true;
log('>>> SUPPRESSION '+label+' pour '+selApp,'error');
var fd=new FormData();
fd.append('image_type',imgType);
fd.append('paths',paths);
fetch(API+'/ftp/delete-image/'+selApp+'?session_id='+sid+'&_t='+Date.now(),{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
if(d.success){
var steps=Array.isArray(d.steps)?d.steps:[];
for(var si=0;si<steps.length;si++){log('  '+steps[si],'success')}
log('>>> Supprime!','success');
setTimeout(function(){pickApp(selApp)},2000);
}else{log('Erreur: '+(d.detail||'fail'),'error')}
}).catch(function(err){log('Erreur: '+err.message,'error')}).finally(function(){busy=false});
};
});

var total=0;images.forEach(function(img){if(img.locations&&img.locations.length)total++});
log('Scan OK: '+total+'/'+images.length+' types','success');

// Force DB button handlers
document.querySelectorAll('.force-db-btn').forEach(function(b){
b.onclick=function(){
if(busy)return;
var imgType=this.getAttribute('data-type');
var label={"icon0":"Jaquette","pic0":"Background XMB","pic1":"BG Start 1","pic2":"BG Start 2"}[imgType]||imgType;
if(!confirm('Forcer le chemin '+label+' dans app.db?\n\n1. Upload '+imgType+' dans appmeta\n2. Ecrire le chemin dans app.db\n3. Re-upload app.db sur PS5\n\nRedemarrage PS5 necessaire apres.'))return;

busy=true;
log('>>> FORCE DB: '+imgType+' pour '+selApp,'warn');

// Step 1: Add image to appmeta if not already there (user needs to select file)
var fd=new FormData();
fd.append('image_type',imgType);

fetch(API+'/ftp/force-db-path/'+selApp+'?session_id='+sid+'&_t='+Date.now(),{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
if(d.success){
var steps=Array.isArray(d.steps)?d.steps:[];
for(var si=0;si<steps.length;si++){
log('  '+steps[si],d.db_uploaded?'success':'warn');
var stEl=document.getElementById('st-'+imgType);
if(stEl){stEl.innerHTML+='<div class="step">'+steps[si]+'</div>';stEl.classList.add('show')}
}
if(d.db_modified&&d.db_uploaded){log('>>> DB modifiee et uploadee! Redemarrez la PS5.','success')}
else if(!d.db_modified){log('>>> Aucune colonne trouvee dans DB pour ce type','warn')}
}else{log('Erreur: '+(d.detail||'fail'),'error')}
}).catch(function(err){log('Erreur: '+err.message,'error')}).finally(function(){busy=false});
};
});

}).catch(function(e){log('Erreur: '+e.message,'error');document.getElementById('imageGrid').innerHTML='<div class="empty">Erreur de scan</div>'});
}

document.getElementById('fileInput').onchange=function(e){
var file=e.target.files[0];
if(!file||!uploadInfo||!selApp)return;

var label={"icon0":"Jaquette","pic0":"Background XMB","pic1":"BG Start 1","pic2":"BG Start 2","save_data":"Save Data"}[uploadInfo.type]||uploadInfo.type;
var nPaths=uploadInfo.paths?uploadInfo.paths.split(',').filter(function(x){return x}).length:0;
var msg=uploadInfo.found?'REMPLACER '+label+' ('+nPaths+' fichiers principaux)':'AJOUTER '+label;

if(!confirm(msg+' avec "'+file.name+'"?\n\nBackup auto + PNG/DDS + chmod 444')){e.target.value='';return}

busy=true;
var card=document.getElementById('card-'+uploadInfo.type);
var ov=document.getElementById('ov-'+uploadInfo.type);
if(card)card.classList.add('uploading');
if(ov)ov.classList.add('show');
document.querySelectorAll('.card-actions button').forEach(function(b){b.disabled=true});

var fd=new FormData();
fd.append('file',file);
fd.append('image_type',uploadInfo.type);

var endpoint;
if(uploadInfo.found&&uploadInfo.paths){
fd.append('target_paths',uploadInfo.paths);
endpoint=API+'/ftp/replace-image/'+selApp+'?session_id='+sid;
log('>>> REMPLACEMENT '+label+' ('+nPaths+' fichiers)','warn');
}else{
endpoint=API+'/ftp/add-image/'+selApp+'?session_id='+sid;
log('>>> AJOUT '+label,'warn');
}

fetch(endpoint,{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(d){
if(d.success){
(d.steps||[]).forEach(function(st){
var stEl=document.getElementById('st-'+uploadInfo.type);
if(stEl){stEl.innerHTML+='<div class="step">'+st+'</div>';stEl.classList.add('show')}
log('  '+st,'success');
});
log('>>> OK!','success');

// If this was an ADD (not replace), propose forcing DB path
if(!uploadInfo.found&&uploadInfo.type!=='save_data'){
log('>>> Image ajoutee. Forcer le chemin dans app.db...','warn');
var fdDb=new FormData();
fdDb.append('image_type',uploadInfo.type);
fetch(API+'/ftp/force-db-path/'+selApp+'?session_id='+sid,{method:'POST',body:fdDb}).then(function(r2){return r2.json()}).then(function(d2){
if(d2.success){
var steps2=Array.isArray(d2.steps)?d2.steps:[];
for(var si=0;si<steps2.length;si++){log('  '+steps2[si],d2.db_uploaded?'success':'warn')}
if(d2.db_modified&&d2.db_uploaded){log('>>> DB modifiee! Redemarrez la PS5.','success')}
else if(!d2.db_modified){log('>>> Pas de colonne DB trouvee - fond generique non modifiable via DB','warn')}
}
}).catch(function(e2){log('DB force err: '+e2.message,'error')});
}

setTimeout(function(){pickApp(selApp)},3000);
}else{
log('Erreur: '+(d.detail||'fail'),'error');
}
}).catch(function(err){log('Erreur: '+err.message,'error')}).finally(function(){
busy=false;
if(card)card.classList.remove('uploading');
if(ov)ov.classList.remove('show');
document.querySelectorAll('.card-actions button').forEach(function(b){b.disabled=false});
});

e.target.value='';
};

document.getElementById('inspectBtn').onclick=function(){
if(!selApp||!sid)return;
log('Inspection app.db pour '+selApp+'...','info');
document.getElementById('modalAppId').textContent=selApp;
document.getElementById('modalBody').innerHTML='<div class="spinner" style="margin:20px auto"></div>';
document.getElementById('modalBg').classList.add('show');
fetch(API+'/ftp/db-inspect/'+selApp+'?session_id='+sid).then(function(r){return r.json()}).then(function(d){
try{
console.log('DB inspect raw:',JSON.stringify(d));
if(!d||d.success!==true){document.getElementById('modalBody').innerHTML='<p style="color:var(--red)">Erreur: '+(d&&d.detail?d.detail:'DB cache vide - reconnectez-vous')+'</p>';return}
var html='<p style="font-size:0.65rem;margin-bottom:10px;color:var(--green-dim)">Source: app.db (cache local) - v2.1</p>';
var cids=[];try{if(d.concept_ids&&Array.isArray(d.concept_ids))cids=d.concept_ids}catch(e2){}
if(cids.length>0){var cidStr='';for(var ci=0;ci<cids.length;ci++){if(ci>0)cidStr+=', ';cidStr+=String(cids[ci])}html+='<p style="font-size:0.75rem;margin-bottom:10px;color:var(--orange)">ConceptId: '+cidStr+'</p>'}
var paths={};try{if(d.paths&&typeof d.paths==='object'&&!Array.isArray(d.paths))paths=d.paths}catch(e3){}
var pk=Object.keys(paths);
if(pk.length>0){html+='<h3 style="font-size:0.75rem;margin-bottom:6px;color:var(--yellow)">Chemins image:</h3>';for(var pi=0;pi<pk.length;pi++){var pkey=pk[pi];html+='<div style="font-size:0.6rem;margin-bottom:3px"><span style="color:var(--cyan)">'+pkey+'</span> = <span style="color:var(--yellow)">'+(paths[pkey]!=null?String(paths[pkey]):'')+'</span></div>'}html+='<br>'}
var entries=[];try{if(d.entries&&Array.isArray(d.entries))entries=d.entries}catch(e4){}
if(entries.length>0){for(var ei=0;ei<entries.length;ei++){var en=entries[ei];if(!en||typeof en!=='object')continue;html+='<div style="margin-bottom:10px;padding:8px;border:1px solid rgba(0,255,65,0.2)"><div style="font-size:0.6rem;color:var(--cyan);margin-bottom:4px">'+(en.db_file?String(en.db_file):'app.db')+' > '+(en.table?String(en.table):'?')+'</div><table>';var dt=(en.data&&typeof en.data==='object')?en.data:{};var dkeys=Object.keys(dt);for(var di=0;di<dkeys.length;di++){var dk=dkeys[di];var dv=(dt[dk]!=null)?String(dt[dk]):'NULL';var isP=(typeof dv==='string'&&dv.indexOf('/')>=0);html+='<tr><th>'+dk+'</th><td style="'+(isP?'color:var(--yellow);font-weight:bold':'')+'">'+dv+'</td></tr>'}html+='</table></div>'}}else{html+='<p style="color:var(--red)">Aucune entree pour '+selApp+'</p>'}
document.getElementById('modalBody').innerHTML=html;
}catch(ex){document.getElementById('modalBody').innerHTML='<p style="color:var(--red)">Erreur rendu (v2.1): '+ex.message+'<br><br>Debug: '+JSON.stringify(d).substring(0,500)+'</p>';console.error('Inspect error:',ex)}
}).catch(function(e){document.getElementById('modalBody').innerHTML='<p style="color:var(--red)">Erreur fetch: '+e.message+'</p>'});};
window.closeModal=function(){document.getElementById('modalBg').classList.remove('show')};
document.getElementById('modalBg').onclick=function(e){if(e.target===this)closeModal()};

// ===== FTP HEARTBEAT - detect disconnect =====
var heartbeatTimer=null;
function startHeartbeat(){
if(heartbeatTimer)clearInterval(heartbeatTimer);
heartbeatTimer=setInterval(function(){
if(!sid){clearInterval(heartbeatTimer);heartbeatTimer=null;return}
fetch(API+'/ftp/ping?session_id='+sid).then(function(r){return r.json()}).then(function(d){
if(!d||!d.alive){
log('PS5 deconnectee!','error');
document.getElementById('statusDot').classList.remove('connected');
document.getElementById('connectBtn').textContent='Connecter';
document.getElementById('connectBtn').classList.remove('danger');
sid=null;
if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null}
}
}).catch(function(){
log('PS5 deconnectee!','error');
document.getElementById('statusDot').classList.remove('connected');
document.getElementById('connectBtn').textContent='Connecter';
document.getElementById('connectBtn').classList.remove('danger');
sid=null;
if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null}
});
},30000);
}

// ===== TEST CONNECTION =====
document.getElementById('testBtn').onclick=function(){
if(!sid)return;
this.textContent='...';
this.disabled=true;
var btn=this;
fetch(API+'/ftp/ping?session_id='+sid).then(function(r){return r.json()}).then(function(d){
if(d&&d.alive){
log('PS5 connectee','success');
document.getElementById('statusDot').classList.add('connected');
btn.style.borderColor='var(--green)';btn.style.color='var(--green)';
}else{
log('PS5 deconnectee!','error');
document.getElementById('statusDot').classList.remove('connected');
document.getElementById('connectBtn').textContent='Connecter';
document.getElementById('connectBtn').classList.remove('danger');
btn.style.borderColor='var(--red)';btn.style.color='var(--red)';
sid=null;btn.style.display='none';
}
}).catch(function(){
log('PS5 deconnectee!','error');
document.getElementById('statusDot').classList.remove('connected');
document.getElementById('connectBtn').textContent='Connecter';
document.getElementById('connectBtn').classList.remove('danger');
btn.style.borderColor='var(--red)';btn.style.color='var(--red)';
sid=null;btn.style.display='none';
}).finally(function(){btn.textContent='Test';btn.disabled=false});
};

// ===== RESTORE BACKUPS =====
document.getElementById('restoreBtn').onclick=function(){
if(!selApp||!sid)return;
log('Recherche backups pour '+selApp+'...','info');
document.getElementById('modalAppId').textContent='Restaurer - '+selApp;
document.getElementById('modalBody').innerHTML='<div class="spinner" style="margin:20px auto"></div><p style="text-align:center;font-size:0.65rem;color:var(--green-dim)">Scan des backups...</p>';
document.getElementById('modalBg').classList.add('show');

fetch(API+'/ftp/list-backups/'+selApp+'?session_id='+sid).then(function(r){return r.json()}).then(function(d){
try{
if(!d||!d.success){document.getElementById('modalBody').innerHTML='<p style="color:var(--red)">Erreur: '+(d&&d.detail?d.detail:'Erreur')+'</p>';return}
var backups=Array.isArray(d.backups)?d.backups:[];
if(backups.length===0){document.getElementById('modalBody').innerHTML='<p style="color:var(--yellow);font-size:0.75rem">Aucun backup trouve pour '+selApp+'</p>';return}

var html='<p style="font-size:0.7rem;color:var(--green-dim);margin-bottom:10px">'+backups.length+' backup(s) trouve(s)</p>';
html+='<button id="restoreAllBtn" data-testid="restore-all-btn" style="width:100%;padding:8px;background:var(--green);color:#000;border:none;font-weight:bold;cursor:pointer;font-size:0.75rem;margin-bottom:12px;border-radius:4px">TOUT RESTAURER</button>';

for(var i=0;i<backups.length;i++){
var bk=backups[i];
var date=bk.timestamp||'?';
var sizeKb=bk.size?Math.round(bk.size/1024)+'KB':'?';
html+='<div style="margin-bottom:6px;padding:6px;border:1px solid rgba(0,255,65,0.15);display:flex;justify-content:space-between;align-items:center">';
html+='<div><div style="font-size:0.65rem;color:var(--yellow)">'+bk.original+'</div><div style="font-size:0.5rem;color:var(--green-dim)">'+date+' - '+sizeKb+' - '+bk.dir.split('/').pop()+'</div></div>';
html+='<button class="restore-one-btn" data-path="'+bk.path+'" data-restore="'+bk.restore_to+'" style="padding:4px 8px;font-size:0.55rem;background:var(--orange);color:#000;border:none;cursor:pointer">Restaurer</button>';
html+='</div>';
}

document.getElementById('modalBody').innerHTML=html;

// Restore all
document.getElementById('restoreAllBtn').onclick=function(){
if(!confirm('Restaurer TOUS les backups originaux pour '+selApp+'?'))return;
this.disabled=true;this.textContent='Restauration...';
log('>>> RESTORE ALL pour '+selApp,'warn');
fetch(API+'/ftp/restore-all/'+selApp+'?session_id='+sid+'&_t='+Date.now(),{method:'POST'}).then(function(r){return r.json()}).then(function(rd){
if(rd.success){
var steps=Array.isArray(rd.steps)?rd.steps:[];
for(var si=0;si<steps.length;si++){log('  '+steps[si],'success')}
log('>>> Restauration terminee!','success');
closeModal();
setTimeout(function(){pickApp(selApp)},2000);
}else{log('Erreur: '+(rd.detail||'fail'),'error')}
}).catch(function(err){log('Erreur: '+err.message,'error')});
};

// Restore individual
document.querySelectorAll('.restore-one-btn').forEach(function(btn){
btn.onclick=function(){
var bPath=this.getAttribute('data-path');
var rTo=this.getAttribute('data-restore');
this.disabled=true;this.textContent='...';
var fd=new FormData();
fd.append('backup_path',bPath);
fd.append('restore_to',rTo);
fetch(API+'/ftp/restore-backup/'+selApp+'?session_id='+sid+'&_t='+Date.now(),{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(rd){
if(rd.success){
var steps=Array.isArray(rd.steps)?rd.steps:[];
for(var si=0;si<steps.length;si++){log('  '+steps[si],'success')}
}else{log('Erreur: '+(rd.detail||'fail'),'error')}
}).catch(function(err){log('Erreur: '+err.message,'error')});
};
});

}catch(ex){document.getElementById('modalBody').innerHTML='<p style="color:var(--red)">Erreur: '+ex.message+'</p>'}
}).catch(function(e){document.getElementById('modalBody').innerHTML='<p style="color:var(--red)">Erreur: '+e.message+'</p>'});
};

})();
</script>
