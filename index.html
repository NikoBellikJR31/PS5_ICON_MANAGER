<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS5 Icon Manager - fsociety</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--green:#00ff41;--green-dim:rgba(0,255,65,0.6);--red:#ff0040;--yellow:#ffd700;--cyan:#00e5ff;--orange:#ff6b00}
body{font-family:'Fira Code',monospace;background:var(--bg);color:var(--green);min-height:100vh}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15),rgba(0,0,0,0.15) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999}
.container{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,0,0.9);border-bottom:1px solid rgba(0,255,65,0.2);position:relative}
.logo{display:flex;align-items:center;gap:14px}
.logo img{width:55px;height:55px;filter:drop-shadow(0 0 12px rgba(0,255,65,0.6));border:1px solid rgba(0,255,65,0.3)}
.logo span{font-family:'Share Tech Mono',monospace;font-size:1.1rem;text-transform:uppercase;letter-spacing:0.12em}
.header-center{position:absolute;left:50%;transform:translateX(-50%)}
#fsocietyText{font-family:'Share Tech Mono',monospace;font-size:2.5rem;font-weight:bold;text-transform:uppercase;letter-spacing:0.4em;color:var(--green);text-shadow:0 0 20px var(--green),0 0 40px var(--green)}
.connection{display:flex;align-items:center;gap:10px;position:relative}
input{background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.3);padding:8px 12px;color:var(--green);font-family:'Fira Code',monospace;font-size:0.85rem}
input:focus{outline:none;border-color:var(--green);box-shadow:0 0 15px rgba(0,255,65,0.3)}
input::placeholder{color:rgba(0,255,65,0.4)}
button{background:transparent;border:1px solid var(--green);color:var(--green);padding:8px 20px;font-family:'Share Tech Mono',monospace;font-size:0.85rem;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
button:hover{background:var(--green);color:var(--bg);box-shadow:0 0 20px rgba(0,255,65,0.5)}
button:disabled{opacity:0.3;cursor:not-allowed}
button.danger{border-color:var(--red);color:var(--red)}
button.danger:hover{background:var(--red);color:#fff}
button.warn{border-color:var(--orange);color:var(--orange)}
button.warn:hover{background:var(--orange);color:#000}
.status-dot{width:8px;height:8px;background:rgba(0,255,65,0.3)}
.status-dot.connected{background:var(--green);box-shadow:0 0 15px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--green)}50%{box-shadow:0 0 25px var(--green)}}
.ip-dropdown{position:absolute;top:100%;left:0;background:#0a0a0a;border:1px solid var(--green);display:none;z-index:100;min-width:220px;margin-top:5px}
.ip-dropdown.show{display:block}
.ip-dropdown div{padding:8px 12px;cursor:pointer;font-size:0.8rem}
.ip-dropdown div:hover{background:rgba(0,255,65,0.2)}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:250px;background:rgba(0,0,0,0.8);border-right:1px solid rgba(0,255,65,0.15);display:flex;flex-direction:column}
.sidebar-header{padding:12px 16px;border-bottom:1px solid rgba(0,255,65,0.15);font-family:'Share Tech Mono',monospace;font-size:0.75rem;text-transform:uppercase}
.apps-list{flex:1;overflow-y:auto;padding:8px}
.app-item{padding:12px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}
.app-item:hover{background:rgba(0,255,65,0.05);border-color:rgba(0,255,65,0.2)}
.app-item.selected{background:rgba(0,255,65,0.1);border-color:var(--green)}
.app-item .game-title{font-size:0.55rem;color:var(--cyan);margin-top:3px;font-style:italic;opacity:0.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-name{font-size:0.85rem}
.content{flex:1;display:flex;flex-direction:column;background:rgba(0,0,0,0.5)}
.content-header{padding:12px 20px;border-bottom:1px solid rgba(0,255,65,0.15);display:none;align-items:center;gap:10px;flex-wrap:wrap}
.content-title{font-family:'Share Tech Mono',monospace;font-size:1.1rem;text-transform:uppercase}
.badge{font-size:0.55rem;padding:3px 8px;border:1px solid}
.cid-badge{font-size:0.6rem;padding:3px 8px;background:rgba(255,107,0,0.15);border:1px solid var(--orange);color:var(--orange)}
.image-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:16px;overflow-y:auto}
.image-card{background:rgba(0,0,0,0.6);border:1px solid rgba(0,255,65,0.2);position:relative}
.image-card:hover{border-color:var(--green);box-shadow:0 0 20px rgba(0,255,65,0.15)}
.image-card.uploading{border-color:var(--yellow);animation:glow 1s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.2)}50%{box-shadow:0 0 20px rgba(255,215,0,0.5)}}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(0,255,65,0.05);border-bottom:1px solid rgba(0,255,65,0.15);font-size:0.75rem}
.card-dim{font-size:0.65rem;color:var(--green-dim);padding:2px 6px;background:rgba(0,255,65,0.1);border:1px solid rgba(0,255,65,0.15)}
.card-preview{aspect-ratio:16/9;background:#050505;display:flex;align-items:center;justify-content:center;color:rgba(0,255,65,0.4);font-size:0.7rem;overflow:hidden}
.card-preview.square{aspect-ratio:1}
.card-preview img{max-width:100%;max-height:100%;object-fit:contain}
.card-locs{padding:6px 10px;font-size:0.5rem;background:rgba(0,0,0,0.4);border-top:1px solid rgba(0,255,65,0.1);max-height:80px;overflow-y:auto}
.loc{padding:2px 0;display:flex;align-items:center;gap:6px}
.loc-dot{width:6px;height:6px;min-width:6px;border-radius:50%}
.loc-dot.appmeta{background:var(--green)}
.loc-dot.catalog{background:var(--orange)}
.loc-dot.other{background:var(--cyan)}
.loc-path{word-break:break-all;color:var(--green-dim)}
.loc-size{color:rgba(0,255,65,0.4);white-space:nowrap}
.card-actions{padding:8px 12px;background:rgba(0,0,0,0.4)}
.card-actions button{width:100%;font-size:0.7rem;padding:6px 12px}
.card-status{padding:6px 10px;font-size:0.55rem;background:rgba(0,0,0,0.5);border-top:1px solid rgba(0,255,65,0.1);display:none;max-height:100px;overflow-y:auto}
.card-status.show{display:block}
.card-status .step{margin-bottom:2px;padding-left:8px;border-left:2px solid var(--green)}
.terminal{height:150px;background:#050505;border-top:1px solid rgba(0,255,65,0.2)}
.terminal-header{padding:6px 16px;background:rgba(0,255,65,0.05);border-bottom:1px solid rgba(0,255,65,0.1);font-family:'Share Tech Mono',monospace;font-size:0.7rem;text-transform:uppercase}
.terminal-content{padding:8px 16px;font-size:0.7rem;height:calc(100% - 30px);overflow-y:auto}
.log{margin-bottom:3px}.log-time{color:rgba(0,255,65,0.4);margin-right:8px}
.log-msg{color:rgba(0,255,65,0.8)}.log-msg.success{color:var(--green)}.log-msg.error{color:var(--red)}.log-msg.warn{color:var(--yellow)}.log-msg.info{color:var(--cyan)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(0,255,65,0.4);font-size:0.85rem}
.overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:10;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.overlay.show{display:flex}
.spinner{width:24px;height:24px;border:2px solid rgba(0,255,65,0.2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay span{font-size:0.7rem}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#0a0a0a;border:1px solid var(--green);padding:20px;max-width:850px;width:90%;max-height:80vh;overflow-y:auto}
.modal.wide{max-width:95vw;width:95vw;max-height:90vh}
.modal h2{font-family:'Share Tech Mono',monospace;font-size:1rem;margin-bottom:14px}
.modal table{width:100%;border-collapse:collapse;font-size:0.6rem;margin-bottom:14px}
.modal th,.modal td{padding:4px 8px;border:1px solid rgba(0,255,65,0.2);text-align:left;word-break:break-all}
.modal th{background:rgba(0,255,65,0.1)}
.tabs{display:flex;border-bottom:1px solid rgba(0,255,65,0.2);background:rgba(0,0,0,0.6)}
.tab{padding:8px 20px;font-family:'Share Tech Mono',monospace;font-size:0.75rem;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;color:var(--green-dim)}
.tab:hover{color:var(--green)}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column}
.tab-content.active{display:flex}
.db-table-item{display:inline-block;padding:8px 12px;cursor:pointer;font-size:0.65rem;border:1px solid rgba(0,255,65,0.3);margin:3px}
.db-table-item:hover{background:rgba(0,255,65,0.1);border-color:var(--green)}

/* === RESPONSIVE === */
@media(max-width:900px){
.header{flex-wrap:wrap;gap:8px;padding:8px 10px}
.header-center{position:static;transform:none;width:100%;text-align:center;order:3}
#fsocietyText{font-size:1.2rem;letter-spacing:0.15em}
.logo img{width:35px;height:35px}
.logo span{font-size:0.75rem}
.connection{flex-wrap:wrap;gap:5px}
.connection input{width:100px;font-size:0.7rem;padding:5px 8px}
.connection button{font-size:0.65rem;padding:5px 10px}
.main{flex-direction:column}
.sidebar{width:100%;max-height:35vh;border-right:none;border-bottom:1px solid rgba(0,255,65,0.15)}
.apps-list{display:flex;flex-wrap:wrap;gap:4px;padding:4px}
.app-item{padding:6px 10px;font-size:0.7rem;flex:1;min-width:100px;text-align:center}
.content{min-height:50vh}
.content-header{padding:8px 10px;flex-wrap:wrap;gap:5px}
.content-header button{font-size:0.5rem;padding:3px 6px}
.content-title{font-size:0.8rem}
.image-grid{grid-template-columns:1fr!important}
.image-card{min-width:auto}
.tabs{flex-wrap:wrap}
.tab{font-size:0.6rem;padding:6px 10px}
.console{max-height:20vh}
}
@media(max-width:500px){
.header-center{display:none}
.sidebar{max-height:25vh}
.app-item{min-width:80px;font-size:0.6rem;padding:4px 6px}
.content-header button{font-size:0.45rem;padding:2px 5px}
.card-header span{font-size:0.6rem}
.card-dim{font-size:0.45rem}
.loc-path{font-size:0.4rem;max-width:200px}
input{font-size:0.7rem;padding:4px 6px}
button{font-size:0.7rem;padding:5px 10px}
}
</style>
</head>
<body>
<div class="container">
<header class="header">
<div class="logo">
<img src="https://customer-assets.emergentagent.com/job_ps5-loader-mod/artifacts/d5zk21kp_IMG_4711.jpeg" alt="fsociety">
<span>PS5 Icon Manager <span style="font-size:0.5rem;color:var(--yellow);margin-left:6px">v3.1</span></span>
</div>
<div class="header-center"><div id="fsocietyText">FSOCIETY</div></div>
<div class="connection">
<div style="position:relative">
<input type="text" id="ip" placeholder="IP PS5" style="width:150px">
<div class="ip-dropdown" id="ipDropdown"></div>
</div>
<input type="text" id="port" value="2121" style="width:70px">
<button id="connectBtn">Connecter</button>
<button id="testBtn" style="padding:4px 8px;font-size:0.55rem;background:transparent;border:1px solid var(--green-dim);color:var(--green-dim);cursor:pointer;display:none" data-testid="test-conn-btn">Test</button>
<div class="status-dot" id="statusDot"></div>
</div>
</header>
<div class="main">
<aside class="sidebar">
<div class="sidebar-header">Applications (<span id="appCount">0</span>)</div>
<div style="padding:6px 8px;border-bottom:1px solid rgba(0,255,65,0.15)"><button id="sysAppsBtn" style="width:100%;padding:5px 8px;font-size:0.6rem;background:rgba(0,229,255,0.15);border:1px solid var(--cyan);color:var(--cyan)" data-testid="sys-apps-btn">Scanner apps systeme</button></div>
<div class="apps-list" id="appsList"><div class="empty">Connectez-vous</div></div>
</aside>
<main class="content">
<div class="tabs">
<div class="tab active" data-tab="images" data-testid="tab-images">Images</div>
<div class="tab" data-tab="dbexplorer" data-testid="tab-db">DB Explorer</div>
</div>
<div class="tab-content active" id="tabImages">
<div class="content-header" id="contentHeader">
<div class="content-title" id="selectedApp">-</div>
<span id="cidBadge" class="cid-badge" style="display:none"></span>
<button id="inspectBtn" style="padding:5px 10px;font-size:0.6rem" class="warn">Inspecter DB</button>
<button id="restoreBtn" style="padding:5px 10px;font-size:0.6rem;background:#ff6b35;color:#000;border:none;cursor:pointer" data-testid="restore-btn">Restaurer backups</button>
<button id="restoreDbBtn" style="padding:5px 10px;font-size:0.6rem;background:#ff2244;color:#fff;border:none;cursor:pointer" data-testid="restore-db-btn">Restaurer DB</button>
<button id="renameBtn" style="padding:5px 10px;font-size:0.6rem;background:var(--cyan);color:#000;border:none;cursor:pointer" data-testid="rename-btn">Renommer</button>
</div>
<div class="image-grid" id="imageGrid"><div class="empty">Selectionnez une application</div></div>
</div>
<div class="tab-content" id="tabDb">
<div style="padding:16px;display:flex;flex-direction:column;height:100%;overflow:hidden">
<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
<input type="text" id="dbSearch" placeholder="Rechercher (ex: NPXS40047, Netflix...)" data-testid="db-search" style="flex:1;min-width:200px">
<button id="dbSearchBtn" style="padding:5px 12px;font-size:0.6rem">Chercher</button>
<button id="dbUploadBtn" style="padding:5px 12px;font-size:0.6rem;background:var(--orange);color:#000;border:none;cursor:pointer" data-testid="db-upload-btn">Upload DB vers PS5</button>
</div>
<div id="dbTablesList" style="flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start"><div class="empty" style="font-size:0.65rem;width:100%">Connectez-vous d'abord</div></div>
</div>
</div>
</main>
</div>
<div class="terminal">
<div class="terminal-header">> Console</div>
<div class="terminal-content" id="logs"></div>
</div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal"><h2>DB - <span id="modalAppId"></span></h2><div id="modalBody"></div><button onclick="closeModal()">Fermer</button></div></div>
<input type="file" id="fileInput" style="display:none" accept="image/*,.jpg,.jpeg,.png,.bmp,.webp">
<script>
(function(){
var API=window.location.origin+'/api';
var sid=null,selApp=null,busy=false,uploadInfo=null,scanId=0;

function log(m,t){var now=new Date().toLocaleTimeString('fr-FR');var el=document.getElementById('logs');el.innerHTML+='<div class="log"><span class="log-time">['+now+']</span><span class="log-msg '+(t||'')+'">'+m+'</span></div>';el.scrollTop=99999}

function saveIp(ip,port){try{var h=JSON.parse(localStorage.getItem('ps5_ips')||'[]');var e=ip+':'+port;h=h.filter(function(x){return x!==e});h.unshift(e);localStorage.setItem('ps5_ips',JSON.stringify(h.slice(0,5)));localStorage.setItem('ps5_ip',ip);localStorage.setItem('ps5_port',port)}catch(ex){try{document.cookie='ps5_ip='+ip+';max-age=31536000;path=/';document.cookie='ps5_port='+port+';max-age=31536000;path=/'}catch(ex2){}}}
function loadIp(){try{var ip=localStorage.getItem('ps5_ip');var port=localStorage.getItem('ps5_port');if(!ip){var c=document.cookie.split(';');for(var i=0;i<c.length;i++){var p=c[i].trim().split('=');if(p[0]==='ps5_ip')ip=p[1];if(p[0]==='ps5_port')port=p[1]}}if(ip)document.getElementById('ip').value=ip;if(port)document.getElementById('port').value=port;buildDD(JSON.parse(localStorage.getItem('ps5_ips')||'[]'))}catch(ex){}}
function buildDD(list){var dd=document.getElementById('ipDropdown');if(!list||!list.length){dd.innerHTML='';return}dd.innerHTML=list.map(function(x){return'<div data-v="'+x+'">'+x+'</div>'}).join('');dd.querySelectorAll('div').forEach(function(el){el.onclick=function(){var p=this.getAttribute('data-v').split(':');document.getElementById('ip').value=p[0];document.getElementById('port').value=p[1]||'2121';dd.classList.remove('show')}})}
document.getElementById('ip').onfocus=function(){var d=document.getElementById('ipDropdown');if(d.innerHTML)d.classList.add('show')};
document.getElementById('ip').onblur=function(){setTimeout(function(){document.getElementById('ipDropdown').classList.remove('show')},200)};
loadIp();

var fs=document.getElementById('fsocietyText');
function tw(){fs.textContent='';var t='FSOCIETY',i=0;function n(){if(i<t.length){fs.textContent+=t.charAt(i);i++;setTimeout(n,150)}}n()}
function fx(){var e=['tw','blink','glitch'][Math.floor(Math.random()*3)];fs.style.transition='';fs.style.opacity='1';fs.style.filter='';fs.style.transform='';if(e==='tw')tw();else if(e==='blink'){fs.textContent='FSOCIETY';var c=0;var b=setInterval(function(){fs.style.opacity=fs.style.opacity==='0'?'1':'0';c++;if(c>10)clearInterval(b)},200)}else{fs.textContent='FSOCIETY';var c2=0;var g=setInterval(function(){fs.style.transform='translate('+((Math.random()-.5)*8)+'px,'+((Math.random()-.5)*8)+'px)';c2++;if(c2>12){clearInterval(g);fs.style.transform=''}},50)}}
setInterval(fx,12000);setTimeout(fx,3000);

document.getElementById('connectBtn').onclick=function(){
if(sid){if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null}fetch(API+'/ftp/disconnect?session_id='+sid,{method:'POST'});sid=null;selApp=null;document.getElementById('statusDot').classList.remove('connected');this.textContent='Connecter';this.classList.remove('danger');document.getElementById('testBtn').style.display='none';document.getElementById('appsList').innerHTML='<div class="empty">Connectez-vous</div>';document.getElementById('appCount').textContent='0';document.getElementById('contentHeader').style.display='none';document.getElementById('imageGrid').innerHTML='<div class="empty">Selectionnez une application</div>';document.getElementById('cidBadge').style.display='none';log('Deconnecte','error')}
else{var ip=document.getElementById('ip').value,port=document.getElementById('port').value;if(!ip){alert('Entrez IP');return}log('Connexion '+ip+':'+port+'...');fetch(API+'/ftp/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip:ip,port:parseInt(port)})}).then(function(r){return r.json()}).then(function(d){if(d.success){sid=d.session_id;saveIp(ip,port);document.getElementById('statusDot').classList.add('connected');document.getElementById('connectBtn').textContent='Deconnecter';document.getElementById('connectBtn').classList.add('danger');log('Connecte!','success');log('DB cache: '+(d.db_cache||'?'),'info');document.getElementById('testBtn').style.display='inline';loadApps()}else log('Erreur: '+(d.detail||'fail'),'error')}).catch(function(e){log('Erreur: '+e.message,'error')})}
};

function loadApps(){log('Scan /user/app/...');fetch(API+'/ftp/apps?session_id='+sid).then(function(r){return r.json()}).then(function(d){var a=d.apps||[];document.getElementById('appCount').textContent=a.length;if(!a.length){document.getElementById('appsList').innerHTML='<div class="empty">Aucune app</div>';return}var h='';for(var i=0;i<a.length;i++){var cid=a[i].cusa_id;h+='<div class="app-item" data-id="'+cid+'"><div class="app-name">'+cid+'</div><div class="game-title" data-gt="'+cid+'"></div></div>'}document.getElementById('appsList').innerHTML=h;document.querySelectorAll('.app-item').forEach(function(el){el.onclick=function(){document.querySelectorAll('.app-item').forEach(function(x){x.classList.remove('selected')});this.classList.add('selected');pickApp(this.getAttribute('data-id'))}});log(a.length+' apps','success')
a.forEach(function(app){var cid=app.cusa_id;fetch(API+'/db/game-name/'+cid).then(function(r){return r.json()}).then(function(gd){if(gd&&gd.name&&gd.name!==cid){var gt=document.querySelector('.game-title[data-gt="'+cid+'"]');if(gt){gt.textContent=gd.name;var it=gt.parentElement;if(it)it.setAttribute('title',gd.name)}}}).catch(function(){})})}).catch(function(e){log('Erreur: '+e.message,'error')})}

function pickApp(id){
selApp=id;
scanId++;
var myScan=scanId;
document.getElementById('contentHeader').style.display='flex';
document.getElementById('selectedApp').textContent=id;
document.getElementById('cidBadge').style.display='none';
document.getElementById('inspectBtn').style.display='';
document.getElementById('restoreBtn').style.display='';
document.getElementById('restoreDbBtn').style.display='';
document.getElementById('renameBtn').style.display='';
document.getElementById('imageGrid').innerHTML='<div class="empty"><div class="spinner" style="margin-bottom:12px"></div>Scan app.db + dossiers FTP...<br><span style="font-size:0.7rem;margin-top:8px">(peut prendre 30-60s)</span></div>';
log('=== SCAN '+id+' ===','warn');


fetch(API+'/db/game-name/'+id).then(function(r){return r.json()}).then(function(nd){
if(nd.name){document.getElementById('selectedApp').textContent=id+' - '+nd.name}
}).catch(function(){});

fetch(API+'/ftp/scan-app/'+id+'?session_id='+sid+'&_t='+Date.now()).then(function(r){return r.json()}).then(function(d){
